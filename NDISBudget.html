<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NDIS Funding Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;min-height:100vh;padding-bottom:40px}
button{cursor:pointer}
input,select{outline:none;font-family:inherit}
input:focus,select:focus{border-color:#6366f1!important}
.header{background:linear-gradient(135deg,#4f46e5,#0ea5e9);padding:28px 24px 20px;color:#fff}
.header-sub{font-size:11px;letter-spacing:1.5px;opacity:.8;text-transform:uppercase;margin-bottom:4px}
.header-title{font-size:22px;font-weight:800;margin-bottom:16px}
.year-btns{display:flex;gap:8px;margin-bottom:16px}
.year-btn{border-radius:8px;padding:5px 14px;font-size:13px;color:#fff;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1)}
.year-btn.active{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.6);font-weight:700}
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.summary-box{background:rgba(255,255,255,.15);border-radius:10px;padding:10px 12px}
.summary-label{font-size:10px;opacity:.8;margin-bottom:3px;text-transform:uppercase;letter-spacing:.8px}
.summary-value{font-weight:800;font-size:15px}
.tabs{display:flex;background:#fff;border-bottom:1.5px solid #e5e7eb;padding:0 20px}
.tab-btn{border:none;background:none;padding:13px 16px;font-size:13px;color:#6b7280;border-bottom:2.5px solid transparent;text-transform:capitalize}
.tab-btn.active{color:#4f46e5;font-weight:700;border-bottom-color:#4f46e5}
.content{padding:20px 18px;max-width:640px;margin:0 auto}
.card{border-radius:16px;padding:20px 22px;margin-bottom:18px;border:1.5px solid}
.card-title{font-weight:700;font-size:15px;margin-bottom:12px}
.stat-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.stat-label{font-size:13px;color:#6b7280}
.stat-value{font-weight:700;font-size:15px}
.stat-sub{font-weight:400;font-size:12px;color:#9ca3af;margin-left:4px}
.progress-wrap{margin:12px 0 4px}
.progress-header{display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:4px}
.progress-track{background:#e5e7eb;border-radius:999px;height:10px;overflow:hidden}
.progress-bar{height:100%;border-radius:999px;transition:width .5s}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.mini-box{background:#fff;border-radius:8px;padding:8px 12px;text-align:center}
.mini-label{font-size:11px;color:#9ca3af;margin-bottom:2px}
.mini-value{font-weight:700}
.form-card{background:#fff;border-radius:16px;border:1.5px solid #e5e7eb;padding:20px 18px;margin-bottom:18px}
.form-title{font-weight:700;font-size:15px;margin-bottom:14px;color:#111827}
.field{margin-bottom:10px}
.field label{font-size:12px;color:#6b7280;display:block;margin-bottom:4px}
.field input,.field select{padding:8px 12px;border-radius:8px;border:1.5px solid #d1d5db;font-size:13px;width:100%;background:#fff}
.two-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.hint-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:13px;color:#166534}
.add-btn{background:#4f46e5;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-weight:600;font-size:13px}
.balance-row{background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;border:1.5px solid}
.balance-name{font-weight:600;font-size:13px}
.balance-spent{font-size:12px;color:#9ca3af;margin-top:2px}
.balance-amount{font-weight:700;font-size:15px}
.balance-sub{font-size:11px;color:#9ca3af}
.history-item{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:8px;padding:8px 12px;margin-bottom:6px}
.history-date{font-size:13px;font-weight:600;color:#111827}
.history-sub{font-size:11px;color:#9ca3af}
.history-amount{font-weight:700}
.del-btn{background:#fee2e2;border:none;border-radius:6px;color:#ef4444;font-weight:700;font-size:12px;padding:3px 8px;margin-left:10px}
.history-total{border-top:1.5px solid;margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-size:13px}
.empty{font-size:13px;color:#9ca3af;text-align:center;padding:10px 0}
.section-title{font-weight:700;font-size:14px;color:#374151;margin-bottom:10px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const BUDGETS = {
  support: { label:"Support Worker", yearlyBudget:55585.64, yearlyHours:832, hourlyRate:67, color:"#6366f1", light:"#eef2ff", border:"#c7d2fe" },
  physio:  { label:"Physio / EP",    yearlyBudget:4783,     yearlyHours:26,  hourlyRate:183.99, color:"#0ea5e9", light:"#e0f2fe", border:"#bae6fd" },
  ot:      { label:"Occupational Therapy", yearlyBudget:4783, yearlyBudgetY2:2760, yearlyHours:26, yearlyHoursY2:15, hourlyRate:183.99, color:"#10b981", light:"#d1fae5", border:"#a7f3d0" }
};

const CATS = [“support”,“physio”,“ot”];
const STORAGE_KEY = “ndis_entries_v2”;

const fmt  = n => “$” + Number(n).toLocaleString(“en-AU”,{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtH = n => Number(n).toFixed(1) + “h”;
const pct  = (u,t) => Math.min(100,(u/t)*100);

// ── State ──────────────────────────────────────────────────────────────────
let state = {
year: 1,
tab: “overview”,
entries: loadEntries(),
form: { cat:“support”, date:””, hours:””, amount:””, note:”” }
};

function loadEntries() {
try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {support:[],physio:[],ot:[]}; }
catch { return {support:[],physio:[],ot:[]}; }
}
function saveEntries() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.entries)); }

function getTotals() {
const r = {};
for (const key of CATS) {
const b = BUDGETS[key];
const budget       = key===“ot” && state.year===2 ? b.yearlyBudgetY2 : b.yearlyBudget;
const budgetHours  = key===“ot” && state.year===2 ? b.yearlyHoursY2  : b.yearlyHours;
const usedAmount   = state.entries[key].reduce((s,e)=>s+e.amount,0);
const usedHours    = state.entries[key].reduce((s,e)=>s+e.hours,0);
r[key] = { budget, budgetHours, usedAmount, usedHours,
remaining: budget-usedAmount, remainingHours: budgetHours-usedHours,
pctAmount: pct(usedAmount,budget), pctHours: pct(usedHours,budgetHours),
monthly: budget/12, weekly: budget/52 };
}
return r;
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
const totals = getTotals();
const grandBudget  = CATS.reduce((s,k)=>s+totals[k].budget,0);
const grandUsed    = CATS.reduce((s,k)=>s+totals[k].usedAmount,0);
const grandRemain  = grandBudget - grandUsed;

const progressColor = (v,color) => v>90?”#ef4444”:v>75?”#f59e0b”:color;

// ── Header ────────────────────────────────
let html = `

  <div class="header">
    <div class="header-sub">NDIS Funding Tracker</div>
    <div class="header-title">Budget Dashboard</div>
    <div class="year-btns">
      <button class="year-btn${state.year===1?" active":""}" onclick="setYear(1)">Year 1</button>
      <button class="year-btn${state.year===2?" active":""}" onclick="setYear(2)">Year 2</button>
    </div>
    <div class="summary-grid">
      <div class="summary-box"><div class="summary-label">Total Budget</div><div class="summary-value">${fmt(grandBudget)}</div></div>
      <div class="summary-box"><div class="summary-label">Total Spent</div><div class="summary-value">${fmt(grandUsed)}</div></div>
      <div class="summary-box"><div class="summary-label">Remaining</div><div class="summary-value">${fmt(grandRemain)}</div></div>
    </div>
  </div>`;

// ── Tabs ──────────────────────────────────
html += `<div class="tabs"> ${["overview","log","history"].map(t=>`<button class=“tab-btn${state.tab===t?” active”:””}” onclick=“setTab(’${t}’)”>${t}</button>`).join(””)}

  </div><div class="content">`;

// ── Overview ──────────────────────────────
if (state.tab === “overview”) {
for (const key of CATS) {
const b = BUDGETS[key]; const t = totals[key];
const pc = progressColor(t.pctAmount, b.color);
html += ` <div class="card" style="background:${b.light};border-color:${b.border}"> <div class="card-title" style="color:${b.color}">${b.label}</div> <div class="stat-row"><span class="stat-label">Annual Budget</span><span class="stat-value" style="color:${b.color}">${fmt(t.budget)}</span></div> <div class="stat-row"><span class="stat-label">Monthly Budget</span><span class="stat-value">${fmt(t.monthly)}</span></div> <div class="stat-row"><span class="stat-label">Weekly Budget</span><span class="stat-value">${fmt(t.weekly)}</span></div> <div class="stat-row"><span class="stat-label">Hourly Rate</span><span class="stat-value">${fmt(b.hourlyRate)}<span class="stat-sub">/hr</span></span></div> <div class="stat-row"><span class="stat-label">Annual Hours</span><span class="stat-value">${fmtH(t.budgetHours)}</span></div> <div class="progress-wrap"> <div class="progress-header"><span>Spend: ${fmt(t.usedAmount)} of ${fmt(t.budget)}</span><span style="color:${pc};font-weight:700">${t.pctAmount.toFixed(1)}%</span></div> <div class="progress-track"><div class="progress-bar" style="width:${t.pctAmount}%;background:${pc}"></div></div> </div> ${t.usedHours>0?`<div class="progress-wrap">
<div class="progress-header"><span>Hours: ${fmtH(t.usedHours)} of ${fmtH(t.budgetHours)}</span><span>${t.pctHours.toFixed(1)}%</span></div>
<div class="progress-track"><div class="progress-bar" style="width:${t.pctHours}%;background:${progressColor(t.pctHours,b.color)}"></div></div>
</div>`:""} <div class="two-col"> <div class="mini-box"><div class="mini-label">$ Remaining</div><div class="mini-value" style="color:${t.remaining<0?"#ef4444":"#111827"}">${fmt(t.remaining)}</div></div> <div class="mini-box"><div class="mini-label">Hours Remaining</div><div class="mini-value" style="color:${t.remainingHours<0?"#ef4444":"#111827"}">${fmtH(t.remainingHours)}</div></div> </div> </div>`;
}
}

// ── Log ───────────────────────────────────
if (state.tab === “log”) {
const estCost = state.form.hours ? fmt((parseFloat(state.form.hours)||0) * BUDGETS[state.form.cat].hourlyRate) : null;
html += ` <div class="form-card"> <div class="form-title">Log a Spend Entry</div> <div class="field"><label>Category</label> <select onchange="setForm('cat',this.value)"> <option value="support"${state.form.cat==="support"?" selected":""}>Support Worker</option> <option value="physio"${state.form.cat==="physio"?" selected":""}>Physio / EP</option> <option value="ot"${state.form.cat==="ot"?" selected":""}>Occupational Therapy</option> </select></div> <div class="field"><label>Date</label> <input type="date" value="${state.form.date}" onchange="setForm('date',this.value)"/></div> <div class="two-fields"> <div class="field" style="margin:0"><label>Hours Used</label> <input type="number" placeholder="e.g. 2" value="${state.form.hours}" oninput="setForm('hours',this.value)"/></div> <div class="field" style="margin:0"><label>Amount ($) — optional</label> <input type="number" placeholder="Auto-calc from hours" value="${state.form.amount}" oninput="setForm('amount',this.value)"/></div> </div> <div class="field"><label>Note (optional)</label> <input type="text" placeholder="e.g. Weekly support session" value="${state.form.note}" oninput="setForm('note',this.value)"/></div> ${estCost?`<div class="hint-box">💡 Estimated cost: ${estCost}</div>`:""} <button class="add-btn" onclick="addEntry()">+ Add Entry</button> </div> <div class="section-title">Current Balances</div>`;
for (const key of CATS) {
const b = BUDGETS[key]; const t = totals[key];
html += `<div class="balance-row" style="border-color:${b.border}"> <div><div class="balance-name" style="color:${b.color}">${b.label}</div><div class="balance-spent">Spent: ${fmt(t.usedAmount)}</div></div> <div style="text-align:right"><div class="balance-amount" style="color:${t.remaining<0?"#ef4444":"#111827"}">${fmt(t.remaining)}</div><div class="balance-sub">remaining</div></div> </div>`;
}
}

// ── History ───────────────────────────────
if (state.tab === “history”) {
for (const key of CATS) {
const b = BUDGETS[key]; const t = totals[key];
const list = […state.entries[key]].sort((a,z)=>new Date(z.date)-new Date(a.date));
html += `<div class="card" style="background:${b.light};border-color:${b.border}"> <div class="card-title" style="color:${b.color}">${b.label}</div>`;
if (list.length===0) {
html += `<div class="empty">No entries yet</div>`;
} else {
list.forEach(e => {
html += `<div class="history-item"> <div><div class="history-date">${e.date}</div><div class="history-sub">${e.hours?e.hours+"h":""}${e.note?" — "+e.note:""}</div></div> <div style="display:flex;align-items:center"> <span class="history-amount" style="color:${b.color}">${fmt(e.amount)}</span> <button class="del-btn" onclick="removeEntry('${key}',${e.id})">✕</button> </div> </div>`;
});
html += `<div class="history-total" style="border-color:${b.border}"> <span style="color:#6b7280">Total logged</span> <span style="font-weight:700;color:${b.color}">${fmt(t.usedAmount)} / ${fmtH(t.usedHours)}</span> </div>`;
}
html += `</div>`;
}
}

html += `</div>`;
document.getElementById(“app”).innerHTML = html;
}

// ── Actions ────────────────────────────────────────────────────────────────
function setYear(y)  { state.year = y; render(); }
function setTab(t)   { state.tab  = t; render(); }
function setForm(k,v){ state.form[k] = v; render(); }

function addEntry() {
const f = state.form;
if (!f.date || (!f.hours && !f.amount)) return;
const hours  = parseFloat(f.hours)  || 0;
const amount = parseFloat(f.amount) || (hours * BUDGETS[f.cat].hourlyRate);
state.entries[f.cat].push({ date:f.date, hours, amount, note:f.note, id:Date.now() });
saveEntries();
state.form = { …state.form, date:””, hours:””, amount:””, note:”” };
render();
}

function removeEntry(cat, id) {
id = Number(id);
state.entries[cat] = state.entries[cat].filter(e => e.id !== id);
saveEntries();
render();
}

render();
</script>

</body>
</html>
