<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NDIS Funding Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, Arial, sans-serif; background: #f1f5f9; }
  a, button { cursor: pointer; }

/* HEADER */
#header { background: linear-gradient(135deg, #4f46e5, #0ea5e9); color: #fff; padding: 24px 20px 20px; }
#header h2 { font-size: 11px; letter-spacing: 1.5px; opacity: .75; text-transform: uppercase; margin-bottom: 4px; }
#header h1 { font-size: 22px; font-weight: 800; margin-bottom: 16px; }
.yr-row { display: flex; gap: 8px; margin-bottom: 16px; }
.yr-btn { background: rgba(255,255,255,.1); border: 1.5px solid rgba(255,255,255,.25); color: #fff; border-radius: 8px; padding: 5px 16px; font-size: 13px; }
.yr-btn.on { background: rgba(255,255,255,.28); border-color: rgba(255,255,255,.7); font-weight: 700; }
.totals { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.tot-box { background: rgba(255,255,255,.15); border-radius: 10px; padding: 10px 12px; }
.tot-box span { display: block; font-size: 10px; opacity: .8; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 3px; }
.tot-box strong { font-size: 15px; font-weight: 800; }

/* TABS */
#tabs { display: flex; background: #fff; border-bottom: 2px solid #e2e8f0; padding: 0 16px; }
.tab { border: none; background: none; padding: 12px 16px; font-size: 13px; color: #64748b; border-bottom: 3px solid transparent; margin-bottom: -2px; text-transform: capitalize; font-family: inherit; }
.tab.on { color: #4f46e5; font-weight: 700; border-bottom-color: #4f46e5; }

/* CONTENT */
#content { padding: 18px 16px; max-width: 640px; margin: 0 auto; }

/* CARDS */
.card { border-radius: 14px; padding: 18px 18px; margin-bottom: 16px; border: 1.5px solid; }
.card h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
.row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }
.row span { font-size: 13px; color: #64748b; }
.row strong { font-size: 14px; font-weight: 700; }
.row small { font-size: 11px; color: #94a3b8; margin-left: 3px; font-weight: 400; }

/* PROGRESS */
.prog-label { display: flex; justify-content: space-between; font-size: 12px; color: #64748b; margin: 10px 0 3px; }
.track { background: #e2e8f0; border-radius: 99px; height: 9px; overflow: hidden; }
.bar { height: 100%; border-radius: 99px; transition: width .4s; }

/* MINI BOXES */
.mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
.mini { background: #fff; border-radius: 8px; padding: 8px 12px; text-align: center; }
.mini span { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
.mini strong { font-size: 14px; font-weight: 700; }

/* FORM */
.form-card { background: #fff; border-radius: 14px; border: 1.5px solid #e2e8f0; padding: 18px; margin-bottom: 16px; }
.form-card h3 { font-size: 14px; font-weight: 700; color: #1e293b; margin-bottom: 14px; }
.field { margin-bottom: 10px; }
.field label { display: block; font-size: 12px; color: #64748b; margin-bottom: 4px; }
.field input, .field select { width: 100%; padding: 8px 10px; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 13px; background: #fff; font-family: inherit; }
.field input:focus, .field select:focus { border-color: #6366f1; outline: none; }
.two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.hint { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #166534; margin-bottom: 10px; }
.add-btn { background: #4f46e5; color: #fff; border: none; border-radius: 8px; padding: 9px 20px; font-weight: 600; font-size: 13px; font-family: inherit; }
.add-btn:hover { background: #4338ca; }

/* BALANCE ROWS */
.bal-row { background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1.5px solid; }
.bal-name { font-size: 13px; font-weight: 600; }
.bal-spent { font-size: 12px; color: #94a3b8; margin-top: 2px; }
.bal-amt { font-size: 15px; font-weight: 700; }
.bal-sub { font-size: 11px; color: #94a3b8; text-align: right; }

/* HISTORY */
.hist-item { background: #fff; border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
.hist-date { font-size: 13px; font-weight: 600; color: #1e293b; }
.hist-note { font-size: 11px; color: #94a3b8; }
.hist-right { display: flex; align-items: center; gap: 8px; }
.hist-amt { font-size: 13px; font-weight: 700; }
.del { background: #fee2e2; border: none; border-radius: 6px; color: #ef4444; font-weight: 700; font-size: 12px; padding: 3px 8px; font-family: inherit; }
.hist-total { display: flex; justify-content: space-between; font-size: 13px; border-top: 1.5px solid; margin-top: 8px; padding-top: 8px; }
.empty { font-size: 13px; color: #94a3b8; text-align: center; padding: 10px 0; }
.sec-title { font-weight: 700; font-size: 13px; color: #374151; margin-bottom: 8px; }
.red { color: #ef4444 !important; }
</style>

</head>
<body>

<div id="header">
  <h2>NDIS Funding Tracker</h2>
  <h1>Budget Dashboard</h1>
  <div class="yr-row">
    <button class="yr-btn on" id="yr1" onclick="setYear(1)">Year 1</button>
    <button class="yr-btn"    id="yr2" onclick="setYear(2)">Year 2</button>
  </div>
  <div class="totals">
    <div class="tot-box"><span>Total Budget</span><strong id="t-budget">—</strong></div>
    <div class="tot-box"><span>Total Spent</span><strong id="t-spent">—</strong></div>
    <div class="tot-box"><span>Remaining</span><strong id="t-remain">—</strong></div>
  </div>
</div>

<div id="tabs">
  <button class="tab on" onclick="setTab('overview')">Overview</button>
  <button class="tab"    onclick="setTab('log')">Log</button>
  <button class="tab"    onclick="setTab('history')">History</button>
</div>

<div id="content"></div>

<script>
var BUDGETS = {
  support: { label:"Support Worker",       yearlyBudget:55585.64, yearlyHours:832, hourlyRate:67,     color:"#6366f1", light:"#eef2ff", border:"#c7d2fe" },
  physio:  { label:"Physio / EP",          yearlyBudget:4783,     yearlyHours:26,  hourlyRate:183.99, color:"#0ea5e9", light:"#e0f2fe", border:"#bae6fd" },
  ot:      { label:"Occupational Therapy", yearlyBudget:4783,     yearlyBudgetY2:2760, yearlyHours:26, yearlyHoursY2:15, hourlyRate:183.99, color:"#10b981", light:"#d1fae5", border:"#a7f3d0" }
};
var CATS = ["support","physio","ot"];
var SK   = "ndis_v3";

var year    = 1;
var tab     = "overview";
var entries = load();
var form    = { cat:"support", date:"", hours:"", amount:"", note:"" };

function load() {
  try { return JSON.parse(localStorage.getItem(SK)) || {support:[],physio:[],ot:[]}; }
  catch(e) { return {support:[],physio:[],ot:[]}; }
}
function save() { try { localStorage.setItem(SK, JSON.stringify(entries)); } catch(e){} }

function money(n) { return "$" + parseFloat(n).toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function hrs(n)   { return parseFloat(n).toFixed(1) + "h"; }
function pct(u,t) { return Math.min(100, u/t*100); }
function barColor(v, c) { return v > 90 ? "#ef4444" : v > 75 ? "#f59e0b" : c; }

function totals() {
  var r = {};
  CATS.forEach(function(k) {
    var b  = BUDGETS[k];
    var bg = (k==="ot" && year===2) ? b.yearlyBudgetY2 : b.yearlyBudget;
    var bh = (k==="ot" && year===2) ? b.yearlyHoursY2  : b.yearlyHours;
    var ua = entries[k].reduce(function(s,e){return s+e.amount;},0);
    var uh = entries[k].reduce(function(s,e){return s+e.hours;},0);
    r[k] = { budget:bg, budgetHours:bh, usedAmount:ua, usedHours:uh,
      remaining:bg-ua, remainingHours:bh-uh,
      pctAmt:pct(ua,bg), pctHrs:pct(uh,bh),
      monthly:bg/12, weekly:bg/52 };
  });
  return r;
}

function updateHeader(t) {
  var gb = CATS.reduce(function(s,k){return s+t[k].budget;},0);
  var gu = CATS.reduce(function(s,k){return s+t[k].usedAmount;},0);
  document.getElementById("t-budget").textContent = money(gb);
  document.getElementById("t-spent").textContent  = money(gu);
  document.getElementById("t-remain").textContent = money(gb-gu);
  document.getElementById("yr1").className = "yr-btn" + (year===1?" on":"");
  document.getElementById("yr2").className = "yr-btn" + (year===2?" on":"");
  document.querySelectorAll(".tab").forEach(function(btn,i){
    var names = ["overview","log","history"];
    btn.className = "tab" + (tab===names[i]?" on":"");
  });
}

function render() {
  var t   = totals();
  updateHeader(t);
  var out = "";

  /* ── OVERVIEW ── */
  if (tab === "overview") {
    CATS.forEach(function(k) {
      var b  = BUDGETS[k];
      var tv = t[k];
      var pc = barColor(tv.pctAmt, b.color);
      out += '<div class="card" style="background:'+b.light+';border-color:'+b.border+'">';
      out += '<h3 style="color:'+b.color+'">'+b.label+'</h3>';
      out += row("Annual Budget",  money(tv.budget),  "", b.color);
      out += row("Monthly Budget", money(tv.monthly), "");
      out += row("Weekly Budget",  money(tv.weekly),  "");
      out += row("Hourly Rate",    money(b.hourlyRate),"<small>/hr</small>");
      out += row("Annual Hours",   hrs(tv.budgetHours),"");
      out += progress("Spend: "+money(tv.usedAmount)+" of "+money(tv.budget), tv.pctAmt, pc);
      if (tv.usedHours > 0) out += progress("Hours: "+hrs(tv.usedHours)+" of "+hrs(tv.budgetHours), tv.pctHrs, barColor(tv.pctHrs, b.color));
      out += '<div class="mini-grid">';
      out += mini("$ Remaining",    money(tv.remaining),      tv.remaining < 0);
      out += mini("Hours Remaining",hrs(tv.remainingHours),   tv.remainingHours < 0);
      out += '</div></div>';
    });
  }

  /* ── LOG ── */
  if (tab === "log") {
    var est = form.hours ? money((parseFloat(form.hours)||0)*BUDGETS[form.cat].hourlyRate) : "";
    out += '<div class="form-card"><h3>Log a Spend Entry</h3>';
    out += field("Category", '<select onchange="setF(\'cat\',this.value)">'+
      opt("support","Support Worker",form.cat)+
      opt("physio","Physio / EP",form.cat)+
      opt("ot","Occupational Therapy",form.cat)+'</select>');
    out += field("Date", '<input type="date" value="'+form.date+'" onchange="setF(\'date\',this.value)"/>');
    out += '<div class="two">';
    out += field("Hours Used", '<input type="number" placeholder="e.g. 2" value="'+form.hours+'" oninput="setF(\'hours\',this.value)"/>');
    out += field("Amount ($) — optional", '<input type="number" placeholder="Auto-calc from hours" value="'+form.amount+'" oninput="setF(\'amount\',this.value)"/>');
    out += '</div>';
    out += field("Note (optional)", '<input type="text" placeholder="e.g. Weekly support session" value="'+esc(form.note)+'" oninput="setF(\'note\',this.value)"/>');
    if (est) out += '<div class="hint">💡 Estimated cost: '+est+'</div>';
    out += '<button class="add-btn" onclick="addEntry()">+ Add Entry</button></div>';
    out += '<div class="sec-title">Current Balances</div>';
    CATS.forEach(function(k) {
      var b = BUDGETS[k]; var tv = t[k];
      out += '<div class="bal-row" style="border-color:'+b.border+'">';
      out += '<div><div class="bal-name" style="color:'+b.color+'">'+b.label+'</div><div class="bal-spent">Spent: '+money(tv.usedAmount)+'</div></div>';
      out += '<div><div class="bal-amt'+(tv.remaining<0?" red":"")+'">'+money(tv.remaining)+'</div><div class="bal-sub">remaining</div></div>';
      out += '</div>';
    });
  }

  /* ── HISTORY ── */
  if (tab === "history") {
    CATS.forEach(function(k) {
      var b  = BUDGETS[k]; var tv = t[k];
      var list = entries[k].slice().sort(function(a,z){return new Date(z.date)-new Date(a.date);});
      out += '<div class="card" style="background:'+b.light+';border-color:'+b.border+'">';
      out += '<h3 style="color:'+b.color+'">'+b.label+'</h3>';
      if (list.length===0) {
        out += '<div class="empty">No entries yet</div>';
      } else {
        list.forEach(function(e) {
          out += '<div class="hist-item">';
          out += '<div><div class="hist-date">'+e.date+'</div>';
          out += '<div class="hist-note">'+(e.hours?e.hours+"h":"")+(e.note?" — "+esc(e.note):"")+'</div></div>';
          out += '<div class="hist-right"><span class="hist-amt" style="color:'+b.color+'">'+money(e.amount)+'</span>';
          out += '<button class="del" onclick="delEntry(\''+k+'\','+e.id+')">✕</button></div>';
          out += '</div>';
        });
        out += '<div class="hist-total" style="border-color:'+b.border+'">';
        out += '<span style="color:#64748b">Total logged</span>';
        out += '<span style="font-weight:700;color:'+b.color+'">'+money(tv.usedAmount)+' / '+hrs(tv.usedHours)+'</span></div>';
      }
      out += '</div>';
    });
  }

  document.getElementById("content").innerHTML = out;
}

/* ── Helpers ── */
function row(label, val, extra, color) {
  return '<div class="row"><span>'+label+'</span><strong style="color:'+(color||"#1e293b")+'">'+val+extra+'</strong></div>';
}
function progress(label, val, color) {
  return '<div class="prog-label"><span>'+label+'</span><span style="color:'+color+';font-weight:700">'+val.toFixed(1)+'%</span></div>'+
         '<div class="track"><div class="bar" style="width:'+val+'%;background:'+color+'"></div></div>';
}
function mini(label, val, isRed) {
  return '<div class="mini"><span>'+label+'</span><strong class="'+(isRed?"red":"")+'">'+val+'</strong></div>';
}
function field(label, input) {
  return '<div class="field"><label>'+label+'</label>'+input+'</div>';
}
function opt(val, text, current) {
  return '<option value="'+val+'"'+(current===val?" selected":"")+'>'+text+'</option>';
}
function esc(s) { return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

/* ── Actions ── */
function setYear(y) { year = y; render(); }
function setTab(t)  { tab  = t; render(); }
function setF(k,v)  { form[k] = v; render(); }

function addEntry() {
  if (!form.date || (!form.hours && !form.amount)) return;
  var h = parseFloat(form.hours)  || 0;
  var a = parseFloat(form.amount) || (h * BUDGETS[form.cat].hourlyRate);
  entries[form.cat].push({ date:form.date, hours:h, amount:a, note:form.note, id:Date.now() });
  save();
  form.date=""; form.hours=""; form.amount=""; form.note="";
  render();
}

function delEntry(cat, id) {
  id = Number(id);
  entries[cat] = entries[cat].filter(function(e){return e.id!==id;});
  save();
  render();
}

render();
</script>

</body>
</html>
