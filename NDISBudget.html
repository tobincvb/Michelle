<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NDIS Funding Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; }
  input, select { outline: none; }
  input:focus, select:focus { border-color: #6366f1 !important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const BUDGETS = {
support: {
label: “Support Worker”,
yearlyBudget: 55585.64,
yearlyHours: 832,
hourlyRate: 67,
color: “#6366f1”, light: “#eef2ff”, border: “#c7d2fe”,
},
physio: {
label: “Physio / EP”,
yearlyBudget: 4783,
yearlyHours: 26,
hourlyRate: 183.99,
color: “#0ea5e9”, light: “#e0f2fe”, border: “#bae6fd”,
},
ot: {
label: “Occupational Therapy”,
yearlyBudget: 4783,
yearlyBudgetY2: 2760,
yearlyHours: 26,
yearlyHoursY2: 15,
hourlyRate: 183.99,
color: “#10b981”, light: “#d1fae5”, border: “#a7f3d0”,
},
};

const fmt = n => “$” + Number(n).toLocaleString(“en-AU”, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtH = n => Number(n).toFixed(1) + “h”;
const pct = (used, total) => Math.min(100, (used / total) * 100);

const STORAGE_KEY = “ndis_entries”;
const loadEntries = () => {
try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { support: [], physio: [], ot: [] }; }
catch { return { support: [], physio: [], ot: [] }; }
};
const saveEntries = entries => localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));

function ProgressBar({ value, color }) {
const c = value > 90 ? “#ef4444” : value > 75 ? “#f59e0b” : color;
return (
<div style={{ background: “#e5e7eb”, borderRadius: 999, height: 10, overflow: “hidden” }}>
<div style={{ width: value + “%”, background: c, height: “100%”, borderRadius: 999, transition: “width 0.5s” }} />
</div>
);
}

function Card({ title, color, light, border, children }) {
return (
<div style={{ background: light, border: “1.5px solid “ + border, borderRadius: 16, padding: “20px 22px”, marginBottom: 18 }}>
<div style={{ fontWeight: 700, fontSize: 15, color, marginBottom: 12 }}>{title}</div>
{children}
</div>
);
}

function StatRow({ label, value, sub, color }) {
return (
<div style={{ display: “flex”, justifyContent: “space-between”, alignItems: “baseline”, marginBottom: 6 }}>
<span style={{ fontSize: 13, color: “#6b7280” }}>{label}</span>
<span style={{ fontWeight: 700, fontSize: 15, color: color || “#111827” }}>
{value}{sub && <span style={{ fontWeight: 400, fontSize: 12, color: “#9ca3af”, marginLeft: 4 }}>{sub}</span>}
</span>
</div>
);
}

function App() {
const [year, setYear] = useState(1);
const [tab, setTab] = useState(“overview”);
const [entries, setEntries] = useState(loadEntries);
const [form, setForm] = useState({ cat: “support”, date: “”, hours: “”, amount: “”, note: “” });

const updateEntries = updated => { setEntries(updated); saveEntries(updated); };

const addEntry = () => {
if (!form.date || (!form.hours && !form.amount)) return;
const hours = parseFloat(form.hours) || 0;
const amount = parseFloat(form.amount) || (hours * BUDGETS[form.cat].hourlyRate);
const updated = { …entries, [form.cat]: […entries[form.cat], { date: form.date, hours, amount, note: form.note, id: Date.now() }] };
updateEntries(updated);
setForm(f => ({ …f, date: “”, hours: “”, amount: “”, note: “” }));
};

const removeEntry = (cat, id) => {
updateEntries({ …entries, [cat]: entries[cat].filter(x => x.id !== id) });
};

const totals = useMemo(() => {
const result = {};
for (const key of [“support”, “physio”, “ot”]) {
const b = BUDGETS[key];
const budget = key === “ot” && year === 2 ? b.yearlyBudgetY2 : b.yearlyBudget;
const budgetHours = key === “ot” && year === 2 ? b.yearlyHoursY2 : b.yearlyHours;
const usedAmount = entries[key].reduce((s, e) => s + e.amount, 0);
const usedHours = entries[key].reduce((s, e) => s + e.hours, 0);
result[key] = {
budget, budgetHours, usedAmount, usedHours,
remaining: budget - usedAmount,
remainingHours: budgetHours - usedHours,
pctAmount: pct(usedAmount, budget),
pctHours: pct(usedHours, budgetHours),
monthly: budget / 12,
weekly: budget / 52,
};
}
return result;
}, [entries, year]);

const grandTotal = useMemo(() => {
const budget = Object.values(totals).reduce((s, t) => s + t.budget, 0);
const used = Object.values(totals).reduce((s, t) => s + t.usedAmount, 0);
return { budget, used, remaining: budget - used };
}, [totals]);

const inputStyle = { padding: “8px 12px”, borderRadius: 8, border: “1.5px solid #d1d5db”, fontSize: 13, width: “100%”, background: “#fff” };

return (
<div style={{ fontFamily: “system-ui, sans-serif”, background: “#f8fafc”, minHeight: “100vh”, paddingBottom: 40 }}>
{/* Header */}
<div style={{ background: “linear-gradient(135deg, #4f46e5 0%, #0ea5e9 100%)”, padding: “28px 24px 20px”, color: “#fff” }}>
<div style={{ fontSize: 11, letterSpacing: 1.5, opacity: 0.8, textTransform: “uppercase”, marginBottom: 4 }}>NDIS Funding Tracker</div>
<div style={{ fontSize: 22, fontWeight: 800, marginBottom: 16 }}>Budget Dashboard</div>
<div style={{ display: “flex”, gap: 8, marginBottom: 16 }}>
{[1, 2].map(y => (
<button key={y} onClick={() => setYear(y)} style={{
background: year === y ? “rgba(255,255,255,0.25)” : “rgba(255,255,255,0.1)”,
border: year === y ? “1.5px solid rgba(255,255,255,0.6)” : “1.5px solid rgba(255,255,255,0.2)”,
color: “#fff”, borderRadius: 8, padding: “5px 14px”, cursor: “pointer”,
fontWeight: year === y ? 700 : 400, fontSize: 13
}}>Year {y}</button>
))}
</div>
<div style={{ display: “grid”, gridTemplateColumns: “1fr 1fr 1fr”, gap: 10 }}>
{[
{ l: “Total Budget”, v: fmt(grandTotal.budget) },
{ l: “Total Spent”, v: fmt(grandTotal.used) },
{ l: “Remaining”, v: fmt(grandTotal.remaining) },
].map(({ l, v }) => (
<div key={l} style={{ background: “rgba(255,255,255,0.15)”, borderRadius: 10, padding: “10px 12px” }}>
<div style={{ fontSize: 10, opacity: 0.8, marginBottom: 3, textTransform: “uppercase”, letterSpacing: 0.8 }}>{l}</div>
<div style={{ fontWeight: 800, fontSize: 15 }}>{v}</div>
</div>
))}
</div>
</div>
